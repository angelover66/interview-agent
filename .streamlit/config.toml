[theme]
primaryColor = "#5E6AD2"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA"
textColor = "#1A1A1D"
font = "sans serif"

[server]
maxUploadSize = 50
maxMessageSize = 200
# 上传大文件超时保护
fileUploaderMimeTypes = ["image/png", "image/jpeg", "image/webp", "application/pdf", "text/plain", "text/markdown", "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"]

[browser]
gatherUsageStats = false

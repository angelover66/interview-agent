# Interview Agent 配置
llm:
  provider: "deepseek"       # anthropic | deepseek | openai
  model: "deepseek-chat"
  api_key: ""  # 请设置环境变量 DEEPSEEK_API_KEY，或在 .env 文件中填写
  max_tokens: 4096
  temperature: 0.7

storage:
  base_dir: "./data"

search:
  provider: "tavily"         # tavily | serpapi | none
  api_key: ""

obsidian:
  vault_path: "/Users/lulu/Desktop/PM工作相关"  # 你的 Obsidian Vault 路径

mock:
  max_questions: 10
  question_timeout_minutes: 5
  evaluation_dimensions:
    - 逻辑架构
    - B端思维
    - 数据意识
    - 岗位匹配度
    - 表达质量

# v2.0.3: JD 图片提取使用 OpenAI GPT-4o via 0011.ai 代理
vision:
  provider: "openai"
  base_url: "https://api.0011.ai/v1"  # 0011.ai OpenAI 兼容代理
  model: "gpt-4o"

voice:
  provider: "openai"
  model: "whisper-1"

# Interview Agent 配置
llm:
  provider: "deepseek"       # anthropic | deepseek | openai
  model: "deepseek-chat"
  api_key: ""  # 请设置环境变量 DEEPSEEK_API_KEY，或在 .env 文件中填写
  max_tokens: 4096
  temperature: 0.7

storage:
  base_dir: "./data"

search:
  provider: "tavily"         # tavily | serpapi | none
  api_key: ""

obsidian:
  vault_path: "/Users/lulu/Desktop/PM工作相关"  # 你的 Obsidian Vault 路径

mock:
  max_questions: 10
  question_timeout_minutes: 5
  evaluation_dimensions:
    - 逻辑架构
    - B端思维
    - 数据意识
    - 岗位匹配度
    - 表达质量

# v2.0.2: Vision 使用 DeepSeek 多模态（与主 LLM 共用 API key）
# deepseek-chat 支持图片输入，无需额外配置

voice:
  provider: "openai"               # OpenAI Whisper API（语音转文字，可选）
  model: "whisper-1"
